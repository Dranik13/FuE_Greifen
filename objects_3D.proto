syntax = "proto3";

message Object3D_msg {
  int32 id = 1;
  string label = 2;
  float x = 3;
  float y = 4;
  float z = 5;
  float orientation = 6;
  float vy = 7;
  float width = 8;
  float length = 9;
  float height = 10;
  bool square = 11;
}

message Objects3D_msg {
  repeated Object3D_msg objects = 1;
}
