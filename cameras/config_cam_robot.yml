%YAML:1.0

zmq_port: 5556
debug: 1

# Camera selection 
serial_number: "241122074842"

# Depth distance reference (adjust based on your setup)
conveyor_z_dist: 1000   # reference depth [mm]
min_obj_height: 10
z_offset: 0

ref_pt:     # reference point in input image for extrinsic calibration
  x: 320
  y: 240

# Maximum deltas per frame for object list
pos_tol: 50
size_tol: 50
orientation_tol: 0.5

# Edge detection
canny_thresh1: 50
canny_thresh2: 150
