camera:
  model: pinhole
intrinsics:   
  fx: 324.703 #454.2 #908.4
  fy: 241.537 #454.2 #908.4
  cx: 598.554 #320.7 #641.5
  cy: 598.359 #240.6 #361.3

perform_intrinsic_calibration: true

use_extrinsic_guesses: true

camera_mount_to_camera_guess:
  x: 0.1
  y: -0.02
  z: -0.06
  qx: 0.0
  qy: 0.0
  qz: 0.707
  qw: 0.707

target_mount_to_target_guess:
  x: 0.2      # Durchschnitt deiner X-Positionen (statt 0.0 oder 0.5)
  y: -0.75    # Durchschnitt deiner Y-Positionen (statt 0.0 oder -0.66)
  z: 0.0      # WICHTIG: Das bleibt 0 (Tischhöhe)
  qx: 0.0
  qy: 0.0
  qz: 0.0
  qw: 1.0     # Das Board liegt flach auf dem Tisch

homography_threshold: 2.0
static_camera: false

target_finder:
  type: ArucoGridTargetFinder
  rows: 7                   # Anzahl der Marker-Reihen (Zähle die schwarzen Quadrate!)
  cols: 5                   # Anzahl der Marker-Spalten
  aruco_marker_dim: 0.027   # <--- MESSEN: Kantenlänge des schwarzen Quadrats in Metern (z.B. 3cm = 0.03)
  marker_gap: 0.0040   # <--- MESSEN: Der weiße Abstand zwischen zwei Markern in Metern
  dictionary: 10   # Das Standard-Wörterbuch. Wenn er nichts findet, probiere DICT_5X5_250 oder DICT_6X6_250
