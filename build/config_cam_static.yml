%YAML:1.0

zmq_port: 5555
debug: 1

# Camera selection 
serial_number: f1370107

roi:
  x: 130
  y: 0
  width: 420              # = 580 - 160
  height: 415

conveyor_z_dist: 865      # relative to fixed camera [mm]
min_obj_height: 15
z_offset: 15              # offset, because of conveyor reflection 
max_obj_height_mm: 150     # maximum expected object height in mm (for filtering)
min_contour_area: 500.0   # minimum contour area to be considered an object (in pixels)
search_area_y_min: -350.0 # minimum y-coordinate of the search area (in mm)
search_area_y_max: 190.0  # maximum y-coordinate of the search area (in mm)
x_scale: 1.0              # optional affine calibration in robot frame
y_scale: 1.0
x_offset_mm: -35.0        # measured systematic x-bias compensation
y_offset_mm: 0.0

calibration:              # extrinsic calibration of fixed camera to robot frame
    x: 0.7433
    y: -0.7671
    z: 0.9107
    roll: 177.51
    pitch: -0.49
    yaw: 0.0

# Maximum deltas per frame for object list
pos_tol: 30
size_tol:  30
orientation_tol: 0.44

# edge detection
canny_thresh1: 50       # threshold1 – first threshold for the hysteresis procedure.
canny_thresh2: 150      # threshold2 – second threshold for the hysteresis procedure.